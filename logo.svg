<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="grain1" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#d4a017"/>
      <stop offset="100%" stop-color="#f5d76e"/>
    </linearGradient>
    <linearGradient id="grain2" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#b8860b"/>
      <stop offset="100%" stop-color="#e6b94d"/>
    </linearGradient>
    <linearGradient id="stem" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#5a4a2a"/>
      <stop offset="100%" stop-color="#8b7a3a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" rx="16" fill="url(#bg)"/>

  <!-- Icon: 3 stylized wheat stalks forming H -->
  <g transform="translate(60, 30)">
    <!-- Left stalk -->
    <line x1="30" y1="140" x2="30" y2="20" stroke="url(#stem)" stroke-width="3" stroke-linecap="round"/>
    <!-- Left head: grain droplets -->
    <ellipse cx="30" cy="18" rx="4" ry="6" fill="url(#grain1)"/>
    <ellipse cx="26" cy="12" rx="3" ry="5" fill="url(#grain2)"/>
    <ellipse cx="34" cy="12" rx="3" ry="5" fill="url(#grain2)"/>
    <ellipse cx="22" cy="26" rx="3" ry="4" fill="url(#grain2)"/>
    <ellipse cx="38" cy="26" rx="3" ry="4" fill="url(#grain2)"/>
    <!-- Left awn (whiskers) -->
    <line x1="30" y1="8" x2="22" y2="0" stroke="#f5d76e" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="30" y1="8" x2="38" y2="0" stroke="#f5d76e" stroke-width="1.5" stroke-linecap="round"/>

    <!-- Right stalk -->
    <line x1="74" y1="140" x2="74" y2="20" stroke="url(#stem)" stroke-width="3" stroke-linecap="round"/>
    <ellipse cx="74" cy="18" rx="4" ry="6" fill="url(#grain1)"/>
    <ellipse cx="70" cy="12" rx="3" ry="5" fill="url(#grain2)"/>
    <ellipse cx="78" cy="12" rx="3" ry="5" fill="url(#grain2)"/>
    <ellipse cx="66" cy="26" rx="3" ry="4" fill="url(#grain2)"/>
    <ellipse cx="82" cy="26" rx="3" ry="4" fill="url(#grain2)"/>
    <line x1="74" y1="8" x2="66" y2="0" stroke="#f5d76e" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="74" y1="8" x2="82" y2="0" stroke="#f5d76e" stroke-width="1.5" stroke-linecap="round"/>

    <!-- Crossbar (wavy line connecting stalks) -->
    <path d="M20 78 Q35 68, 52 78 Q69 88, 84 78" stroke="url(#stem)" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- Small grain on crossbar -->
    <ellipse cx="52" cy="72" rx="3" ry="4" fill="url(#grain1)"/>

    <!-- Extra center stalk (subtle, mid) -->
    <line x1="52" y1="140" x2="52" y2="40" stroke="url(#stem)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    <ellipse cx="52" cy="38" rx="3" ry="4" fill="url(#grain1)" opacity="0.7"/>

    <!-- Bottom stem decoration -->
    <path d="M15 140 Q30 130, 52 138 Q74 146, 89 140" stroke="#5a4a2a" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.5"/>
  </g>

  <!-- Wordmark: HARVEST -->
  <g transform="translate(185, 55)">
    <text x="0" y="0" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="64" font-weight="700" letter-spacing="6" fill="#f5d76e">
      HARVEST
    </text>
    <text x="0" y="36" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="400" letter-spacing="4" fill="#a08030" opacity="0.8">
      WEB COLLECTION ENGINE
    </text>
  </g>

  <!-- Decorative line -->
  <line x1="30" y1="178" x2="770" y2="178" stroke="#f5d76e" stroke-width="1" opacity="0.3"/>
</svg>

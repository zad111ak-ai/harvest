<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A78BFA"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5B21B6"/>
      <stop offset="100%" style="stop-color:#C4B5FD"/>
    </linearGradient>
  </defs>

  <!-- Dark cosmic background -->
  <circle cx="256" cy="256" r="230" fill="#0F0A1A"/>

  <!-- Outer ring — the "crop circle" boundary -->
  <circle cx="256" cy="256" r="190" fill="none" stroke="url(#g)" stroke-width="1.5" opacity="0.25"/>

  <!-- 4 large circles forming the classic crop circle pattern -->
  <circle cx="256" cy="108" r="60" fill="none" stroke="url(#g)" stroke-width="2" opacity="0.6"/>
  <circle cx="256" cy="404" r="60" fill="none" stroke="url(#g)" stroke-width="2" opacity="0.6"/>
  <circle cx="108" cy="256" r="60" fill="none" stroke="url(#g)" stroke-width="2" opacity="0.6"/>
  <circle cx="404" cy="256" r="60" fill="none" stroke="url(#g)" stroke-width="2" opacity="0.6"/>

  <!-- Diagonal small circles -->
  <circle cx="163" cy="163" r="35" fill="none" stroke="#A78BFA" stroke-width="1.5" opacity="0.35"/>
  <circle cx="349" cy="163" r="35" fill="none" stroke="#A78BFA" stroke-width="1.5" opacity="0.35"/>
  <circle cx="163" cy="349" r="35" fill="none" stroke="#A78BFA" stroke-width="1.5" opacity="0.35"/>
  <circle cx="349" cy="349" r="35" fill="none" stroke="#A78BFA" stroke-width="1.5" opacity="0.35"/>

  <!-- Connecting lines — the "grid" of harvested data -->
  <line x1="108" y1="256" x2="256" y2="108" stroke="#7C3AED" stroke-width="1" opacity="0.2"/>
  <line x1="256" y1="108" x2="404" y2="256" stroke="#7C3AED" stroke-width="1" opacity="0.2"/>
  <line x1="404" y1="256" x2="256" y2="404" stroke="#7C3AED" stroke-width="1" opacity="0.2"/>
  <line x1="256" y1="404" x2="108" y2="256" stroke="#7C3AED" stroke-width="1" opacity="0.2"/>

  <!-- Central symbol — the "eye" / collection point -->
  <circle cx="256" cy="256" r="30" fill="none" stroke="url(#g)" stroke-width="2.5"/>
  <circle cx="256" cy="256" r="8" fill="url(#g)"/>

  <!-- Subtle glow around center -->
  <circle cx="256" cy="256" r="16" fill="#A78BFA" opacity="0.08"/>

  <!-- Data particles being drawn in -->
  <circle cx="170" cy="170" r="3" fill="#C4B5FD" opacity="0.6"/>
  <circle cx="342" cy="170" r="3" fill="#C4B5FD" opacity="0.6"/>
  <circle cx="170" cy="342" r="3" fill="#C4B5FD" opacity="0.6"/>
  <circle cx="342" cy="342" r="3" fill="#C4B5FD" opacity="0.6"/>

  <!-- Trailing paths -- data flowing to center -->
  <path d="M170 170 Q200 200 230 230" stroke="#C4B5FD" stroke-width="1" fill="none" opacity="0.25"/>
  <path d="M342 170 Q312 200 282 230" stroke="#C4B5FD" stroke-width="1" fill="none" opacity="0.25"/>
  <path d="M170 342 Q200 312 230 282" stroke="#C4B5FD" stroke-width="1" fill="none" opacity="0.25"/>
  <path d="M342 342 Q312 312 282 282" stroke="#C4B5FD" stroke-width="1" fill="none" opacity="0.25"/>
</svg>
